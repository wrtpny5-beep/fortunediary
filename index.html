*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

    radial-gradient(ellipse at 30% 70%,rgba(255,200,230,0.5) 0%,transparent 40%),

  z-index:0;pointer-events:none}
body::after{content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse at 60% 30%,rgba(255,255,255,0.4) 0%,transparent 40%),
    radial-gradient(ellipse at 20% 80%,rgba(200,180,255,0.3) 0%,transparent 35%);

@keyframes shimmer{0%{opacity:.4;transform:scale(1) translate(0,0)}50%{opacity:.7;transform:scale(1.05) translate(-1%,1%)}100%{opacity:.4;transform:scale(1) translate(1%,-1%)}}

import{initializeApp}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import{getAuth,GoogleAuthProvider,signInWithPopup,signOut as fbSignOut,onAuthStateChanged}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import{getFirestore,collection,addDoc,getDocs,deleteDoc,doc,query,orderBy,serverTimestamp}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig={
  apiKey:"AIzaSyCN2Yf54AwJlyeEmr9ylGwO6ZPCUSyiK3w",
  authDomain:"fortunetelling-ae36f.firebaseapp.com",
  projectId:"fortunetelling-ae36f",
  storageBucket:"fortunetelling-ae36f.firebasestorage.app",
  messagingSenderId:"785548535092",
  appId:"1:785548535092:web:96cd915c0cbe94e68ff161"
};

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);
const provider=new GoogleAuthProvider();
provider.setCustomParameters({prompt:'select_account'});

let currentUser=null;

window.signInWithGoogle=async()=>{
  try{await signInWithPopup(auth,provider);}
  catch(e){console.error(e);showToast('로그인 실패. 다시 시도해주세요');}
};
window.signOut=async()=>{
  await fbSignOut(auth);
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('main-app').style.display='none';
  entries=[];
};

onAuthStateChanged(auth,async user=>{
  if(user){
    currentUser=user;
    document.getElementById('login-screen').style.display='none';
    document.getElementById('main-app').style.display='block';
    document.getElementById('user-photo').src=user.photoURL||'';
    document.getElementById('user-name').textContent=user.displayName?.split(' ')[0]||'';
    await loadEntries();
  } else {
    currentUser=null;
    document.getElementById('login-screen').style.display='flex';
    document.getElementById('main-app').style.display='none';
  }
});

async function loadEntries(){
  setSyncStatus('불러오는 중...');
  try{
    const uid=currentUser.uid;
    const q=query(collection(db,`users/${uid}/entries`),orderBy('createdAt','desc'));
    const snap=await getDocs(q);
    entries=snap.docs.map(d=>({...d.data(),_docId:d.id}));
    setSyncStatus('✦ 동기화됨');
    setTimeout(()=>setSyncStatus(''),2000);
  }catch(e){setSyncStatus('⚠ 불러오기 실패');console.error(e);}
}

window._saveToFirebase=async(entry)=>{
  if(!currentUser)return;
  setSyncStatus('저장 중...');
  try{
    const uid=currentUser.uid;
    const ref=await addDoc(collection(db,`users/${uid}/entries`),{
      ...entry,createdAt:serverTimestamp()
    });
    entries[0]._docId=ref.id;
    setSyncStatus('✦ 저장됨');
    setTimeout(()=>setSyncStatus(''),2000);
  }catch(e){setSyncStatus('⚠ 저장 실패');console.error(e);}
};

window._deleteFromFirebase=async(docId)=>{
  if(!currentUser||!docId)return;
  const uid=currentUser.uid;
  try{await deleteDoc(doc(db,`users/${uid}/entries`,docId));}
  catch(e){console.error(e);}
};

function setSyncStatus(msg){document.getElementById('sync-status').textContent=msg;}
</script>

<script>
// ── SPARKLE ──
(function(){
  const cvs=document.getElementById('sparkle-canvas');
  const ctx=cvs.getContext('2d');
  let W,H,sparks=[];
  function resize(){W=cvs.width=window.innerWidth;H=cvs.height=window.innerHeight;}
  window.addEventListener('resize',resize);resize();
  function mkSpark(){return{x:Math.random()*W,y:Math.random()*H,size:Math.random()*3+1,alpha:0,maxAlpha:Math.random()*0.7+0.3,life:Math.random()*200+100,age:0};}
  for(let i=0;i<28;i++){const s=mkSpark();s.age=Math.random()*s.life;sparks.push(s);}
  function drawStar(x,y,size,alpha){
    ctx.save();ctx.globalAlpha=alpha;ctx.strokeStyle='white';ctx.lineWidth=size*0.4;ctx.lineCap='round';
    [[0,-size*2.5,0,-size*0.4],[0,size*2.5,0,size*0.4],[-size*2.5,0,-size*0.4,0],[size*2.5,0,size*0.4,0]].forEach(([x1,y1,x2,y2])=>{ctx.beginPath();ctx.moveTo(x+x1,y+y1);ctx.lineTo(x+x2,y+y2);ctx.stroke();});
    ctx.restore();
  }
  function frame(){
    ctx.clearRect(0,0,W,H);
    sparks.forEach((s,i)=>{s.age++;const t=s.age/s.life;s.alpha=t<.3?(t/.3)*s.maxAlpha:t>.7?((1-t)/.3)*s.maxAlpha:s.maxAlpha;drawStar(s.x,s.y,s.size,s.alpha);if(s.age>=s.life)sparks[i]=mkSpark();});
    requestAnimationFrame(frame);
  }
  frame();
})();

function getMoon(ds){
  const d=ds?new Date(ds+'T12:00:00'):new Date(),ref=new Date('2000-01-06T18:14:00Z'),cyc=29.53058867,diff=(d-ref)/86400000;
  const p=((diff%cyc)+cyc)%cyc,pct=p/cyc;
  if(pct<.025||pct>=.975)return{e:'🌑',n:'삭월'};if(pct<.25)return{e:'🌒',n:'초승달'};
  if(pct<.275)return{e:'🌓',n:'상현달'};if(pct<.475)return{e:'🌔',n:'상현망'};
  if(pct<.525)return{e:'🌕',n:'보름달'};if(pct<.725)return{e:'🌖',n:'하현망'};
  if(pct<.75)return{e:'🌗',n:'하현달'};return{e:'🌘',n:'그믐달'};
}

function resetForm(){

let cardFlt=''; // selected card filter

function setF(el,v){
  flt=v; cardFlt='';
  document.querySelectorAll('.fc').forEach(f=>f.classList.remove('on'));
  el.classList.add('on');
  buildCardFilterChips();
  renderList();
}

function buildCardFilterChips(){
  // collect all unique cards from entries matching current deck filter
  const wrap=document.getElementById('card-filter-wrap');
  const chipsEl=document.getElementById('card-filter-chips');
  const filtered=flt==='all'?entries:entries.filter(e=>(e.decks||[]).includes(flt));
  const cardMap=new Map(); // name -> deck
  filtered.forEach(e=>(e.cards||[]).forEach(c=>{const n=c.n||c;if(!cardMap.has(n))cardMap.set(n,c.d||'t');}));
  if(cardMap.size===0){wrap.style.display='none';cardFlt='';return;}
  wrap.style.display='block';
  chipsEl.innerHTML=[...cardMap.entries()].map(([name,d])=>{
    const m=DM[d]||DM.t;
    const on=cardFlt===name;
    return'<button class="fc'+(on?' on':'')+'" style="'+(on?'background:rgba(197,207,232,0.6);':'')+'" onclick="setCardFlt(\''+name.replace(/'/g,"\\'")+'\')" >'+name+'</button>';
  }).join('');
}

function setCardFlt(name){
  cardFlt=cardFlt===name?'':name;
  buildCardFilterChips();
  renderList();
}

function renderList(){
  const q=document.getElementById('srch').value.toLowerCase(),el=document.getElementById('elist');
  let f=entries.filter(e=>{
    if(flt!=='all'&&!(e.decks||[]).includes(flt))return false;
    if(cardFlt&&!(e.cards||[]).some(c=>(c.n||c)===cardFlt))return false;
    if(q){const h=[e.question,e.interpretation,...(e.cards||[]).map(c=>c.n||c),...(e.tags||[])].join(' ').toLowerCase();return h.includes(q);}
    return true;
  });
  if(!f.length){el.innerHTML='<div class="empty"><span class="empty-ic">✦</span><p style="font-size:14px">'+(entries.length?'검색 결과가 없어요':'아직 기록이 없어요<br>첫 번째 리딩을 기록해보세요')+'</p></div>';return;}
  el.innerHTML=f.map(e=>{
    const ds=(e.date||'').replace(/-/g,'.');
    const pills=(e.decks||[]).map(d=>'<span class="dpill '+(DM[d]?.pil||'')+'">'+(DM[d]?.label||d)+'</span>').join('');
    const cards=(e.cards||[]).map(c=>'<span class="cb '+(DM[c.d||'t']?.bad||'bt')+'" style="font-size:11px"><span>'+(c.n||c)+'</span></span>').join('');
    const tags=(e.tags||[]).map(t=>'<span class="etag">'+t+'</span>').join('');
    return'<div class="ecard" onclick="openModal('+e.id+')"><div class="ehdr"><span class="edate">'+(e.moon||'')+' '+ds+'</span>'+pills+'</div><div class="eq">'+e.question+'</div><div class="ecards">'+cards+'</div>'+(e.interpretation?'<div class="esum">'+e.interpretation+'</div>':'')+(tags?'<div class="etags">'+tags+'</div>':'')+'</div>';
  }).join('');
}
function openModal(id){
  const e=entries.find(x=>x.id===id);if(!e)return;
  const ds=(e.date||'').replace(/-/g,'.');
  const pills=(e.decks||[]).map(d=>'<span class="dpill '+(DM[d]?.pil||'')+'">'+(DM[d]?.label||d)+'</span>').join('');
  const cards=(e.cards||[]).map(c=>'<span class="cb '+(DM[c.d||'t']?.bad||'bt')+'"><span>'+(c.n||c)+'</span></span>').join('');
  const tags=(e.tags||[]).map(t=>'<span class="etag">'+t+'</span>').join('');
  document.getElementById('mc').innerHTML='<div class="mhandle"></div><div class="mhd"><div class="mtitle">'+(e.moon||'')+' '+ds+'</div><button class="mclose" onclick="closeModal()">✕</button></div><div class="mpills">'+pills+'</div><div class="ds"><div class="dl">질문 · 의도</div><div class="dv" style="font-weight:500;font-family:\'Noto Serif KR\',serif">'+e.question+'</div></div><div class="ds"><div class="dl">카드 · 룬</div><div style="display:flex;flex-wrap:wrap;gap:5px;margin-top:4px">'+cards+'</div></div>'+(e.interpretation?'<div class="ds"><div class="dl">해석 · 느낌</div><div class="dv">'+e.interpretation.replace(/\n/g,'<br>')+'</div></div>':'')+(tags?'<div class="ds"><div class="dl">태그</div><div class="etags" style="margin-top:4px">'+tags+'</div></div>':'')+'<button class="bdel" onclick="delEntry('+e.id+')">× 이 기록 삭제</button>';
  document.getElementById('mov').classList.add('on');
}
function closeModal(){document.getElementById('mov').classList.remove('on');}
function closeMBg(e){if(e.target.id==='mov')closeModal();}
async function delEntry(id){
  if(!confirm('이 기록을 삭제할까요?'))return;
  const entry=entries.find(e=>e.id===id);
  entries=entries.filter(e=>e.id!==id);
  if(entry?._docId)await window._deleteFromFirebase(entry._docId);
  closeModal();renderList();showToast('기록이 삭제되었어요');
}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),2500);}

    {id:"ar13",num:"XIII",name:"죽음 (Death)",sub:"변환 · 끝과 시작 · 놓아주기",el:"물",planet:"명왕성",zodiac:"전갈자리",yn:"Maybe",kw:["변환","끝","새로운 시작","놓아주기","필연적 변화","재탄생"],up:"묵은 것이 끝나야 새것이 시작된다. 두려워하지 마라. 이 끝은 더 나은 시작의 씨앗이다.",dn:"변화에 저항하거나 끝을 인정하지 않는 상태.",sym:[["백마 탄 해골 기사","계급과 신분을 가리지 않는 변화의 보편성"],["떠오르는 태양","끝은 언제나 새로운 시작의 약속을 품고 있다"],["흰 장미 깃발","순수함과 재탄생. 죽음은 끝이 아닌 변환의 과정"]]},
    {id:"ar14",num:"XIV",name:"절제 (Temperance)",sub:"균형 · 조화 · 인내",el:"불",planet:"목성",zodiac:"사수자리",yn:"Yes",kw:["균형","조화","인내","통합","중용","치유"],up:"천천히, 꾸준히, 극단 없이. 두 가지를 하나로 통합할 때 진짜 연금술이 일어난다.",dn:"불균형, 과잉, 극단적 행동.",sym:[["물을 붓는 천사","두 컵 사이에서 물을 흘려보낸다. 의식과 무의식의 통합"],["한 발은 물에 한 발은 땅에","두 세계 사이의 균형"],["이마의 삼각형","물질 세계 안에 깃든 영적 불꽃"]]},

    {id:"ar20",num:"XX",name:"심판 (Judgement)",sub:"각성 · 부활 · 소명",el:"불",planet:"명왕성",zodiac:"전갈자리",yn:"Yes",kw:["각성","부활","소명","자기용서","평가","해방"],up:"과거를 용서하고 진정한 자아의 부름에 응답할 때. 새로운 단계로 도약할 준비가 되었다.",dn:"자기 비판, 죄책감, 기회를 놓치는 두려움.",sym:[["가브리엘의 나팔","신성한 소환. 영혼의 깨어남을 알리는 우주적 호출"],["관에서 일어나는 사람들","과거의 속박에서 벗어나 새로운 차원으로 부활하는 영혼들"],["십자가 깃발","영적 힘과 물질적 세계의 통합"]]},

      {rank:"5",kw:["갈등","경쟁","소통의 어려움","혼란"],up:"다양한 의견의 충돌. 경쟁적 환경에서 자신의 입장을 유지하라.",dn:"갈등 회피, 내부 갈등."},

      {rank:"8",kw:["빠른 움직임","행동","소통","가속"],up:"모든 것이 빠르게 움직인다. 지금이 행동할 때.",dn:"지연, 빠른 변화에 적응 못하는 상태."},

    cups:{el:"물",note:"감정·직관·관계·무의식의 원소. 컵은 우리의 감정 세계, 사랑과 꿈의 영역이에요.",cards:[

let studyCat="major",studyQ="";

function renderStudy(){
  const root=document.getElementById("study-root");
  if(!root)return;
  root.innerHTML=`
    <div class="study-cats">
      <button class="scat${studyCat==="major"?" on":""}" onclick="setStudyCat('major')">메이저 아르카나</button>
      <button class="scat${studyCat==="wands"?" on":""}" onclick="setStudyCat('wands')">완드</button>
      <button class="scat${studyCat==="cups"?" on":""}" onclick="setStudyCat('cups')">컵</button>
      <button class="scat${studyCat==="swords"?" on":""}" onclick="setStudyCat('swords')">소드</button>
      <button class="scat${studyCat==="pentacles"?" on":""}" onclick="setStudyCat('pentacles')">펜타클</button>
      <button class="scat${studyCat==="runes"?" on":""}" onclick="setStudyCat('runes')">룬스톤</button>
    </div>
    <div class="study-search"><span class="si">&#x2315;</span><input type="text" placeholder="카드·룬 이름 검색..." value="${studyQ.replace(/"/g,'&quot;')}" oninput="studyQ=this.value;renderStudy()"/></div>
    <div class="sc-list">${buildStudyCards()}</div>`;
}

function setStudyCat(cat){studyCat=cat;studyQ="";renderStudy();}

function buildStudyCards(){
  const q=studyQ.toLowerCase();
  if(studyCat==="major"){
    const f=SD.major.filter(c=>!q||c.name.toLowerCase().includes(q)||c.kw.some(k=>k.includes(q)));
    return f.map(c=>majorCard(c)).join("");
  }
  if(studyCat==="runes"){
    const f=SD.runes.filter(r=>!q||r.name.toLowerCase().includes(q)||r.kor.includes(q)||r.kw.some(k=>k.includes(q)));
    return f.map(r=>runeCard(r)).join("");
  }
  const suit=SD.minor[studyCat];
  const suitNote=`<div class="suit-note"><b>원소: ${suit.el}</b> — ${suit.note}</div>`;
  const f=suit.cards.filter(c=>!q||c.rank.includes(q)||c.kw.some(k=>k.includes(q)));
  return suitNote+f.map((c,i)=>minorCard(c,studyCat,i)).join("");
}

const SUIT_LABELS={wands:"완드",cups:"컵",swords:"소드",pentacles:"펜타클"};

function ynBadge(yn){
  if(yn==="Yes")return'<span class="sb2 sb-sage">Yes 카드</span>';
  if(yn==="No")return'<span class="sb2 sb-rose">No 카드</span>';
  return'<span class="sb2 sb-gray">Maybe</span>';
}

function majorCard(c){
  const img=CARD_IMG[c.id]?`<div class="sc-img-wrap" id="img-${c.id}"><img class="sc-img" src="${CARD_IMG[c.id]}" alt="${c.name}" loading="lazy"/></div>`:"";
  return`<div class="sc" id="sc-${c.id}"><div class="sc-hdr" onclick="toggleSC('${c.id}')"><div class="sc-top"><div><div class="sc-num">메이저 아르카나 &middot; ${c.num}</div><div class="sc-name">${c.name}</div><div class="sc-sub">${c.sub}</div></div></div><div class="sc-badges"><span class="sb2 sb-lav">원소: ${c.el}</span><span class="sb2 sb-mint">행성: ${c.planet}</span><span class="sb2 sb-lav">별자리: ${c.zodiac}</span>${ynBadge(c.yn)}</div></div><div class="sc-body" id="scb-${c.id}">${img}<div><div class="slabel">핵심 키워드</div><div class="skws">${c.kw.map(k=>`<span class="skw">${k}</span>`).join("")}</div></div><div class="sdiv"></div><div class="sdir"><div class="sdir-box sdir-up"><div class="sdir-t">&#x2191; 정방향</div><div class="sdir-d">${c.up}</div></div><div class="sdir-box sdir-dn"><div class="sdir-t">&#x2193; 역방향</div><div class="sdir-d">${c.dn}</div></div></div><div class="ssym"><div class="slabel">주요 상징</div><div class="ssym-list">${c.sym.map(s=>`<div class="ssym-item"><span class="ssym-t">${s[0]}</span> &mdash; ${s[1]}</div>`).join("")}</div></div></div></div>`;
}

function minorCard(c,suit,i){
  const id=suit+i;
  const sl=SUIT_LABELS[suit];
  const img=CARD_IMG[id]?`<div class="sc-img-wrap" id="img-${id}"><img class="sc-img" src="${CARD_IMG[id]}" alt="${c.rank} 오브 ${sl}" loading="lazy"/></div>`:"";
  return`<div class="sc" id="sc-${id}"><div class="sc-hdr" onclick="toggleSC('${id}')"><div class="sc-top"><div><div class="sc-num">${sl}</div><div class="sc-name">${c.rank} 오브 ${sl}</div></div></div><div class="sc-badges">${c.kw.slice(0,3).map(k=>`<span class="sb2 sb-lav">${k}</span>`).join("")}</div></div><div class="sc-body" id="scb-${id}">${img}<div><div class="slabel">핵심 키워드</div><div class="skws">${c.kw.map(k=>`<span class="skw">${k}</span>`).join("")}</div></div><div class="sdiv"></div><div class="sdir"><div class="sdir-box sdir-up"><div class="sdir-t">&#x2191; 정방향</div><div class="sdir-d">${c.up}</div></div><div class="sdir-box sdir-dn"><div class="sdir-t">&#x2193; 역방향</div><div class="sdir-d">${c.dn}</div></div></div></div></div>`;
}

function runeCard(r){
  const id="rune-"+r.name;
  return`<div class="sc" id="sc-${id}"><div class="sc-hdr" onclick="toggleSC('${id}')"><div class="sc-top"><div><div class="sc-num">엘더 푸사르크</div><div class="sc-name"><span class="rune-sym">${r.sym}</span> ${r.name}</div><div class="sc-sub">${r.kor}</div></div></div><div class="sc-badges">${r.kw.map(k=>`<span class="sb2 sb-mint">${k}</span>`).join("")}</div></div><div class="sc-body" id="scb-${id}"><div><div class="slabel">의미</div><div class="sdir-d" style="font-size:13px;color:#6a5888;line-height:1.7">${r.meaning}</div></div></div></div>`;
}

function toggleSC(id){
  const hdr=document.querySelector("#sc-"+id+" .sc-hdr");
  const body=document.getElementById("scb-"+id);
  const imgWrap=document.getElementById("img-"+id);
  const open=body.classList.contains("open");
  body.classList.toggle("open",!open);
  if(imgWrap)imgWrap.classList.toggle("open",!open);
  if(hdr)hdr.classList.toggle("open",!open);
}

</script>
</body>
</html>
